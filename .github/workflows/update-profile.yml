name: Update Reference Profile

on:
  schedule:
    - cron: '0 3 * * *'   # 매일 새벽 3시 (UTC) 자동 실행
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # reference_profile.json 커밋 권한

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js ws nodemailer

      - name: Fetch published data and update profile
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/update-profile.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reference_profile.json
          git diff --cached --quiet || git commit -m "chore: auto-update reference_profile.json [skip ci]"
          git push

      - name: Send daily report email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_TO: mason@dotincorp.com
        run: node scripts/send-report.js
